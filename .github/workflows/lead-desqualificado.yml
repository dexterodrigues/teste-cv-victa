name: Lead Desqualificado - Vista Coqueiral

on:
  schedule:
    - cron: "*/30 * * * *"  # a cada 30 minutos
  workflow_dispatch: {}       # permite rodar manualmente pela aba Actions

# Necessario para o job poder commitar o state.json de volta no repositorio
permissions:
  contents: write

jobs:
  poll-e-envia:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests

      - name: Rodar polling e enviar eventos
        env:
          CV_CRM_SUBDOMINIO: ${{ secrets.CV_CRM_SUBDOMINIO }}
          CV_CRM_EMAIL: ${{ secrets.CV_CRM_EMAIL }}
          CV_CRM_TOKEN: ${{ secrets.CV_CRM_TOKEN }}
          META_CAPI_ACCESS_TOKEN: ${{ secrets.META_CAPI_ACCESS_TOKEN }}
        run: python poll_cv_crm_leads_desqualificados.py

      - name: Commitar state.json atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: atualiza state.json do polling de leads desqualificados"
          git push
